name: OpenTofu Plan

on:
  pull_request:
    paths:
      - "terraform/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  plan:
    runs-on: ubuntu-latest
    env:
      PROXMOX_VE_ENDPOINT: ${{ secrets.PROXMOX_VE_ENDPOINT }}
      PROXMOX_VE_API_TOKEN: ${{ secrets.PROXMOX_VE_API_TOKEN }}
      TF_VAR_state_encryption_passphrase: ${{ secrets.TOFU_STATE_PASSPHRASE }}
      TF_VAR_tailscale_authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: tag:ci
          args: "--accept-routes"

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

      - name: OpenTofu Init
        working-directory: terraform
        run: tofu init

      - name: OpenTofu Plan
        id: plan
        working-directory: terraform
        run: |
          set +e
          OUTPUT=$(tofu plan -no-color 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"
          {
            echo "output<<TOFU_EOF"
            echo "$OUTPUT" | tail -80
            echo "TOFU_EOF"
          } >> "$GITHUB_OUTPUT"
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          exit $EXIT_CODE

      - name: Comment plan result on PR
        if: always()
        uses: actions/github-script@v7
        env:
          PLAN_OUTPUT: ${{ steps.plan.outputs.output }}
          PLAN_EXIT_CODE: ${{ steps.plan.outputs.exit_code }}
        with:
          script: |
            const marker = '<!-- tofu-plan -->';
            const exitCode = process.env.PLAN_EXIT_CODE;
            const status = exitCode === '0' ? '✅ Plan succeeded' : '❌ Plan failed';
            const output = process.env.PLAN_OUTPUT;
            const body = `${marker}\n### ${status}\n\n<details><summary>OpenTofu output</summary>\n\n\`\`\`\n${output}\n\`\`\`\n\n</details>\n\nComment \`/tf-apply\` to apply these changes.`;
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/id_ed25519
