name: Ansible Apply

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      playbook:
        description: "Playbook to run"
        required: true
        type: choice
        options:
          - site.yml
          - network-update.yml

permissions:
  contents: read
  pull-requests: write
  issues: write
  statuses: write

jobs:
  apply-from-comment:
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      github.event.comment.body == '/ansible-apply' &&
      github.event.comment.user.login == 'turtton'
    runs-on: ubuntu-latest
    steps:
      - name: Add reaction to comment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            });

      - name: Get PR branch
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            core.setOutput('ref', pr.data.head.ref);
            core.setOutput('sha', pr.data.head.sha);

      - name: Set pending commit status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ steps.pr.outputs.sha }}',
              state: 'pending',
              context: 'Ansible Apply',
              description: 'Apply is running...',
              target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.ref }}

      - name: Install Ansible
        run: pip install ansible

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: tag:ci

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Write vault password
        run: echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > /tmp/.vault-pass

      - name: Run ansible-playbook
        id: apply
        working-directory: ansible
        run: |
          set +e
          OUTPUT=$(ansible-playbook playbooks/site.yml \
            --diff \
            --vault-password-file /tmp/.vault-pass 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"
          {
            echo "output<<ANSIBLE_EOF"
            echo "$OUTPUT" | tail -80
            echo "ANSIBLE_EOF"
          } >> "$GITHUB_OUTPUT"
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          exit $EXIT_CODE

      - name: Comment apply result on PR
        if: always()
        uses: actions/github-script@v7
        env:
          APPLY_OUTPUT: ${{ steps.apply.outputs.output }}
          APPLY_EXIT_CODE: ${{ steps.apply.outputs.exit_code }}
        with:
          script: |
            const marker = '<!-- ansible-apply -->';
            const exitCode = process.env.APPLY_EXIT_CODE;
            const status = exitCode === '0' ? '✅ Apply succeeded' : '❌ Apply failed';
            const output = process.env.APPLY_OUTPUT;
            const body = `${marker}\n### ${status}\n\n<details><summary>Ansible output</summary>\n\n\`\`\`\n${output}\n\`\`\`\n\n</details>`;
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }

      - name: Set final commit status
        if: always()
        uses: actions/github-script@v7
        env:
          APPLY_EXIT_CODE: ${{ steps.apply.outputs.exit_code }}
        with:
          script: |
            const exitCode = process.env.APPLY_EXIT_CODE;
            const state = exitCode === '0' ? 'success' : 'failure';
            const description = exitCode === '0' ? 'Apply succeeded' : 'Apply failed';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ steps.pr.outputs.sha }}',
              state: state,
              context: 'Ansible Apply',
              description: description,
              target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });

      - name: Cleanup
        if: always()
        run: rm -f /tmp/.vault-pass ~/.ssh/id_ed25519

  apply-manual:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ansible
        run: pip install ansible

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: tag:ci

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Write vault password
        run: echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > /tmp/.vault-pass

      - name: Run ansible-playbook
        working-directory: ansible
        run: |
          ansible-playbook playbooks/${{ inputs.playbook }} \
            --diff \
            --vault-password-file /tmp/.vault-pass

      - name: Cleanup
        if: always()
        run: rm -f /tmp/.vault-pass ~/.ssh/id_ed25519
