apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - helmrepository.yaml
  - grafana-admin.sops.yaml
  - alertmanager-discord-webhook.sops.yaml
  - helmrelease.yaml
configMapGenerator:
  - name: grafana-dashboard-pve
    namespace: monitoring
    options:
      labels:
        grafana_dashboard: "1"
      disableNameSuffixHash: true
    files:
      - pve.json=dashboards/pve.json
  - name: grafana-dashboard-flux-control-plane
    namespace: monitoring
    options:
      labels:
        grafana_dashboard: "1"
      disableNameSuffixHash: true
    files:
      - flux-control-plane.json=dashboards/flux-control-plane.json
  - name: grafana-dashboard-longhorn
    namespace: monitoring
    options:
      labels:
        grafana_dashboard: "1"
      disableNameSuffixHash: true
    files:
      - longhorn.json=dashboards/longhorn.json
  - name: grafana-dashboard-iceshrimp
    namespace: monitoring
    options:
      labels:
        grafana_dashboard: "1"
      disableNameSuffixHash: true
    files:
      - iceshrimp.json=dashboards/iceshrimp.json
  - name: grafana-dashboard-apps-overview
    namespace: monitoring
    options:
      labels:
        grafana_dashboard: "1"
      disableNameSuffixHash: true
    files:
      - apps-overview.json=dashboards/apps-overview.json
