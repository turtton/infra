apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - helmrepository.yaml
  - grafana-admin.sops.yaml
  - alertmanager-discord-webhook.sops.yaml
  - helmrelease.yaml
  - flux-podmonitor.yaml
configMapGenerator:
  - name: grafana-dashboard-pve
    namespace: monitoring
    options:
      labels:
        grafana_dashboard: "1"
      disableNameSuffixHash: true
    files:
      - pve.json=dashboards/pve.json
  - name: grafana-dashboard-flux-cluster
    namespace: monitoring
    options:
      labels:
        grafana_dashboard: "1"
      disableNameSuffixHash: true
    files:
      - flux-cluster.json=dashboards/flux-cluster.json
  - name: grafana-dashboard-flux-control-plane
    namespace: monitoring
    options:
      labels:
        grafana_dashboard: "1"
      disableNameSuffixHash: true
    files:
      - flux-control-plane.json=dashboards/flux-control-plane.json
