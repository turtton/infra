apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - helmrepository.yaml
  - grafana-admin.sops.yaml
  - alertmanager-discord-webhook.sops.yaml
  - helmrelease.yaml
configMapGenerator:
  - name: grafana-dashboard-pve
    namespace: monitoring
    options:
      labels:
        grafana_dashboard: "1"
      disableNameSuffixHash: true
    files:
      - pve.json=dashboards/pve.json
