---
apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: home
  namespace: openclaw
spec:
  envFrom:
    - secretRef:
        name: openclaw-shared-secrets
    - secretRef:
        name: openclaw-home-secrets

  storage:
    persistence:
      enabled: true
      size: 5Gi
      storageClass: longhorn

  config:
    mergeMode: overwrite
    raw:
      auth:
        profiles:
          github-copilot:github:
            provider: github-copilot
            mode: token
      models:
        providers:
          voyage:
            baseUrl: "https://api.voyageai.com/v1"
            models:
              - id: voyage-4
                name: voyage-4
      agents:
        defaults:
          model:
            primary: github-copilot/claude-sonnet-4.6
          memorySearch:
            provider: voyage
            remote:
              batch:
                enabled: false
            model: voyage-4
          compaction:
            mode: safeguard
          maxConcurrent: 4
          subagents:
            maxConcurrent: 8
          sandbox:
            mode: non-main
            workspaceAccess: none
            scope: session
        list:
          - id: main
            default: true
          - id: config-ops
            agentDir: agents/config-ops
            sandbox:
              workspaceAccess: rw
              scope: agent
      tools:
        profile: full
        web:
          search:
            enabled: true
          fetch:
            enabled: true
        exec:
          security: full
          ask: "off"
      messages:
        ackReactionScope: group-mentions
      commands:
        native: auto
        nativeSkills: auto
        restart: true
        ownerDisplay: raw
      approvals:
        exec:
          enabled: false
      channels:
        discord:
          enabled: true
          groupPolicy: allowlist
          streaming: "off"
          dm:
            enabled: true
            policy: allowlist
            allowFrom:
              - "275915497353117697"
          guilds:
            "280320003159490561":
              channels:
                "299106923741970432":
                  allow: true
                "280320003159490561":
                  allow: true
          execApprovals:
            enabled: false
      gateway:
        controlUi:
          allowedOrigins:
            - "https://openclaw-home.taile2777.ts.net"
        auth:
          mode: token
          allowTailscale: true
      skills:
        install:
          nodeManager: bun
      plugins:
        entries:
          discord:
            enabled: true

  extraVolumes:
    - name: config-ops-workspace
      configMap:
        name: config-ops-workspace

  extraVolumeMounts:
    - name: config-ops-workspace
      mountPath: /home/openclaw/.openclaw/workspace/agents/config-ops/AGENTS.md
      subPath: AGENTS.md
      readOnly: true

  selfConfigure:
    enabled: true
    allowedActions:
      - config
      - skills
      - workspaceFiles
