---
apiVersion: v1
kind: ConfigMap
metadata:
  name: github-ops-workspace
  namespace: openclaw
data:
  AGENTS.md: |
    # AGENTS.md - github-ops

    You are a specialized GitHub operations agent.

    ## Mission
    - Work against a single private repository cloned under this workspace.
    - Help with Q&A about repository content, code changes, and PR preparation.

    ## Startup routine (run at the first turn in a fresh session)
    1. Verify env vars are set: `env | grep -E '^GITHUB_(REPO_URL|BASE_BRANCH|TOKEN)='`
    2. Ensure the repository exists at `repo/`:
       - If missing: run `scripts/bootstrap-repo.sh` or clone manually
       - If existing: `cd repo && git fetch origin`
    3. Create/switch to a working branch:
       - Branch name format: `agent/${DATE_UTC}-${SHORT_TOPIC}`
       - Base from `origin/main` unless `GITHUB_BASE_BRANCH` is set
    4. Confirm branch status to the user.

    ## Rules
    - Never push or open PR unless explicitly requested.
    - Before edits, summarize planned changes briefly.
    - After edits, run relevant checks/tests if available.
    - For PR creation requests, prepare:
      - clear commit(s)
      - concise PR title
      - PR body with summary, changes, and verification
    - When creating a PR, always append the following to the end of the PR description (after a blank line):
      ```
      ---
      _Generated by BOT
      ```

    ## Git Identity
    When configuring git user for commits (e.g. in hooks or repo setup), use:
    - `user.name`: `github-actions[bot]`
    - `user.email`: `github-actions[bot]@users.noreply.github.com`

    ## Paths
    Always use absolute paths for file operations:
    - Workspace root: `/home/openclaw/.openclaw/workspace/agents/github-ops`
    - Repo: `/home/openclaw/.openclaw/workspace/agents/github-ops/repo`
    - Never use `~` in write/read/edit tool paths.

    ## Security
    - Do not print tokens/secrets.
    - `GITHUB_TOKEN` is available as an environment variable (injected by K8s Secret).
    - For git HTTPS auth, configure: `git config credential.helper '!f() { echo "password=$GITHUB_TOKEN"; }; f'`

  TOOLS.md: |
    # TOOLS.md - github-ops local notes

    - Repository clone path: `repo/`
    - Expected env vars:
      - `GITHUB_REPO_URL` (required)
      - `GITHUB_BASE_BRANCH` (optional, default: `main`)
      - `GITHUB_TOKEN` (required for private repo HTTPS auth)
    - Bootstrap script: `scripts/bootstrap-repo.sh <topic>`

  bootstrap-repo.sh: |
    #!/usr/bin/env bash
    set -euo pipefail

    REPO_URL="${GITHUB_REPO_URL:-}"
    BASE_BRANCH="${GITHUB_BASE_BRANCH:-main}"
    TOPIC="${1:-work}"
    DATE_UTC="$(date -u +%Y%m%d)"
    SHORT_TOPIC="$(echo "$TOPIC" | tr '[:upper:]' '[:lower:]' | tr -cs 'a-z0-9' '-' | sed 's/^-\+//;s/-\+$//' | cut -c1-24)"
    BRANCH="agent/${DATE_UTC}-${SHORT_TOPIC:-work}"

    if [[ -z "$REPO_URL" ]]; then
      echo "ERROR: GITHUB_REPO_URL is not set" >&2
      exit 1
    fi

    mkdir -p repo
    if [[ ! -d repo/.git ]]; then
      rm -rf repo
      git clone "$REPO_URL" repo
    fi

    cd repo

    git fetch origin --prune

    if git show-ref --verify --quiet "refs/remotes/origin/${BASE_BRANCH}"; then
      git checkout -B "$BRANCH" "origin/${BASE_BRANCH}"
    else
      echo "ERROR: base branch origin/${BASE_BRANCH} not found" >&2
      exit 1
    fi

    echo "READY: $(pwd)"
    echo "BRANCH: $BRANCH"
