apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextcloud-valkey
  namespace: nextcloud
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: nextcloud-valkey
  template:
    metadata:
      labels:
        app: nextcloud-valkey
    spec:
      nodeSelector:
        kubernetes.io/hostname: cp-1
      containers:
        - name: valkey
          image: docker.io/valkey/valkey:8.0.2-alpine3.21
          command: ["valkey-server", "--requirepass", "$(VALKEY_PASSWORD)", "--appendonly", "yes"]
          env:
            - name: VALKEY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nextcloud-valkey
                  key: valkey-password
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: valkey-data
              mountPath: /data
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
          livenessProbe:
            exec:
              command: ["sh", "-c", "valkey-cli -a $VALKEY_PASSWORD ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["sh", "-c", "valkey-cli -a $VALKEY_PASSWORD ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
        - name: redis-exporter
          image: docker.io/oliver006/redis_exporter:v1.67.0
          ports:
            - containerPort: 9121
              name: metrics
          env:
            - name: REDIS_ADDR
              value: "redis://localhost:6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nextcloud-valkey
                  key: valkey-password
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
      volumes:
        - name: valkey-data
          persistentVolumeClaim:
            claimName: nextcloud-valkey-data
---
apiVersion: v1
kind: Service
metadata:
  name: nextcloud-valkey
  namespace: nextcloud
spec:
  selector:
    app: nextcloud-valkey
  ports:
    - port: 6379
      targetPort: 6379
