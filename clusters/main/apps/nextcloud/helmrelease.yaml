---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud
  namespace: nextcloud
spec:
  interval: 30m0s
  timeout: 15m0s
  chart:
    spec:
      chart: nextcloud
      version: "9.0.3"
      sourceRef:
        kind: HelmRepository
        name: nextcloud
        namespace: flux-system
      interval: 12h0m0s
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    image:
      flavor: fpm

    ingress:
      enabled: false

    nginx:
      enabled: true

    nextcloud:
      host: nextcloud
      existingSecret:
        enabled: true
        secretName: nextcloud-admin
        usernameKey: nextcloud-username
        passwordKey: nextcloud-password
      extraEnv:
        - name: REDIS_HOST_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nextcloud-valkey
              key: valkey-password
      configs:
        redis.config.php: |-
          <?php
          $CONFIG = array(
            'memcache.distributed' => '\\OC\\Memcache\\Redis',
            'memcache.locking' => '\\OC\\Memcache\\Redis',
            'redis' => array(
              'host' => 'nextcloud-valkey.nextcloud.svc.cluster.local',
              'port' => 6379,
              'password' => getenv('REDIS_HOST_PASSWORD'),
            ),
          );
        reverse-proxy.config.php: |-
          <?php
          $CONFIG = array(
            'overwriteprotocol' => 'https',
            'trusted_proxies' => array(
              '10.244.0.0/16',
              '100.64.0.0/10',
            ),
          );

    externalDatabase:
      enabled: true
      type: postgresql
      host: nextcloud-db-rw.nextcloud.svc.cluster.local
      database: nextcloud
      existingSecret:
        enabled: true
        secretName: nextcloud-db-app
        usernameKey: username
        passwordKey: password

    internalDatabase:
      enabled: false

    cronjob:
      enabled: true

    persistence:
      enabled: true
      storageClass: longhorn
      accessMode: ReadWriteOnce
      size: 250Gi

    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        memory: 2Gi

    nodeSelector:
      kubernetes.io/hostname: cp-1

    livenessProbe:
      enabled: true
      initialDelaySeconds: 60
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 6
    readinessProbe:
      enabled: true
      initialDelaySeconds: 30
      periodSeconds: 15
      timeoutSeconds: 10
      failureThreshold: 4
    startupProbe:
      enabled: true
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 30
