---
apiVersion: v1
kind: ConfigMap
metadata:
  name: attic-config
  namespace: attic
data:
  server.toml: |
    listen = "[::]:8080"
    allowed-hosts = ["attic.taile2777.ts.net", "localhost:8080"]

    [database]
    # url is loaded from ATTIC_SERVER_DATABASE_URL env var

    [storage]
    type = "local"
    path = "/var/lib/attic/storage"

    [chunking]
    nar-size-threshold = 65536
    min-size = 16384
    avg-size = 65536
    max-size = 262144

    [compression]
    type = "zstd"

    [garbage-collection]
    interval = "12 hours"
    default-retention-period = "3 months"
