---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: attic
  namespace: attic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: attic
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: attic
    spec:
      nodeSelector:
        kubernetes.io/hostname: cp-1
      containers:
        - name: attic
          image: ghcr.io/zhaofengli/attic:ff9bf4092fc68f6fa2028ced8bdda48813b40a6e
          command:
            - atticd
            - -f
            - /etc/attic/server.toml
            - --mode
            - monolithic
          env:
            - name: ATTIC_SERVER_TOKEN_HS256_SECRET_BASE64
              valueFrom:
                secretKeyRef:
                  name: attic-secrets
                  key: ATTIC_SERVER_TOKEN_HS256_SECRET_BASE64
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: attic-config
              mountPath: /etc/attic/server.toml
              subPath: server.toml
              readOnly: true
            - name: attic-data
              mountPath: /var/lib/attic
          livenessProbe:
            httpGet:
              path: /
              port: http
              httpHeaders:
                - name: Host
                  value: attic.taile2777.ts.net
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
              httpHeaders:
                - name: Host
                  value: attic.taile2777.ts.net
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
      volumes:
        - name: attic-config
          configMap:
            name: attic-config
        - name: attic-data
          persistentVolumeClaim:
            claimName: attic-data
