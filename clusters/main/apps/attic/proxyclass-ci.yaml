---
apiVersion: tailscale.com/v1alpha1
kind: ProxyClass
metadata:
  name: attic-ci
spec:
  statefulSet:
    pod:
      tailscaleContainer:
        env:
          - name: TS_DEBUG_FIREWALL_MODE
            value: "nftables"
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 512Mi
