apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: livesync-bridge
  namespace: obsidian-livesync
spec:
  type: oci
  url: oci://ghcr.io/turtton
  interval: 30m
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: livesync-bridge
  namespace: obsidian-livesync
spec:
  interval: 30m
  chart:
    spec:
      chart: livesync-bridge
      version: ">=1.0.0 <2.0.0"
      sourceRef:
        kind: HelmRepository
        name: livesync-bridge
  values:
    vaultName: private
    nodeSelector:
      kubernetes.io/hostname: cp-1
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        memory: 1Gi
    persistence:
      vault:
        size: 2Gi
        storageClassName: longhorn
      data:
        size: 512Mi
        storageClassName: longhorn
