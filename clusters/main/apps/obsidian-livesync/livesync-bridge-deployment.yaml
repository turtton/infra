apiVersion: apps/v1
kind: Deployment
metadata:
  name: livesync-bridge
  namespace: obsidian-livesync
spec:
  replicas: 1
  selector:
    matchLabels:
      app: livesync-bridge
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: livesync-bridge
    spec:
      nodeSelector:
        kubernetes.io/hostname: cp-1
      containers:
        - name: livesync-bridge
          image: ghcr.io/turtton/livesync-bridge:latest-patched
          env:
            - name: GIT_REPO_URL
              valueFrom:
                secretKeyRef:
                  name: livesync-bridge-config
                  key: GIT_REPO_URL
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: livesync-bridge-config
                  key: GITHUB_TOKEN
            - name: GIT_BRANCH
              value: main
            - name: GIT_USER_NAME
              value: livesync-bridge
            - name: GIT_USER_EMAIL
              value: livesync-bridge@localhost
            - name: VAULT_DIR
              value: /app/vault/private
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              memory: 1Gi
          volumeMounts:
            - name: livesync-bridge-config
              mountPath: /app/dat/config.json
              subPath: config.json
              readOnly: true
            - name: livesync-bridge-scripts
              mountPath: /app/dat/script/commit.sh
              subPath: commit.sh
            - name: bridge-vault
              mountPath: /app/vault
            - name: bridge-data
              mountPath: /app/data
      volumes:
        - name: livesync-bridge-config
          secret:
            secretName: livesync-bridge-config
            items:
              - key: config.json
                path: config.json
        - name: livesync-bridge-scripts
          configMap:
            name: livesync-bridge-scripts
            defaultMode: 0755
        - name: bridge-vault
          persistentVolumeClaim:
            claimName: bridge-vault
        - name: bridge-data
          persistentVolumeClaim:
            claimName: bridge-data
