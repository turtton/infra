---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openclaw-operator
  namespace: openclaw-operator-system
spec:
  interval: 30m0s
  chart:
    spec:
      chart: openclaw-operator
      version: "0.21.2"
      sourceRef:
        kind: HelmRepository
        name: openclaw-operator
        namespace: flux-system
      interval: 12h0m0s
  install:
    crds: Create
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    crds:
      install: true
      keep: true
