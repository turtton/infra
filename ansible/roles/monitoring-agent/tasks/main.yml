---
- name: Validate API token is set
  ansible.builtin.assert:
    that:
      - pve_exporter_api_token_value | length > 0
    fail_msg: "pve_exporter_api_token_value must be set (use ansible-vault)"

- name: Create pve-exporter system group
  ansible.builtin.group:
    name: "{{ pve_exporter_group }}"
    system: true
    state: present

- name: Create pve-exporter system user
  ansible.builtin.user:
    name: "{{ pve_exporter_user }}"
    group: "{{ pve_exporter_group }}"
    system: true
    shell: /usr/sbin/nologin
    home: "{{ pve_exporter_config_dir }}"
    create_home: false

- name: Stop old pve-exporter if running (migration from prometheus-pve-exporter)
  ansible.builtin.systemd:
    name: pve-exporter
    state: stopped
  ignore_errors: true

- name: Remove old prometheus-pve-exporter binary
  ansible.builtin.file:
    path: /usr/local/bin/pve_exporter
    state: absent

- name: Download pve-exporter binary
  ansible.builtin.get_url:
    url: "https://github.com/bigtcze/pve-exporter/releases/download/v{{ pve_exporter_version }}/pve-exporter-linux-amd64"
    dest: "{{ pve_exporter_bin }}"
    mode: "0755"
    owner: root
    group: root
  notify: restart pve-exporter

- name: Create config directory
  ansible.builtin.file:
    path: "{{ pve_exporter_config_dir }}"
    state: directory
    owner: "{{ pve_exporter_user }}"
    group: "{{ pve_exporter_group }}"
    mode: "0750"

- name: Deploy pve-exporter config
  ansible.builtin.template:
    src: pve-exporter.yml.j2
    dest: "{{ pve_exporter_config_dir }}/pve-exporter.yml"
    owner: "{{ pve_exporter_user }}"
    group: "{{ pve_exporter_group }}"
    mode: "0600"
  no_log: true
  notify: restart pve-exporter

- name: Deploy systemd service
  ansible.builtin.template:
    src: pve-exporter.service.j2
    dest: /etc/systemd/system/pve-exporter.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - reload systemd
    - restart pve-exporter

- name: Enable and start pve-exporter
  ansible.builtin.systemd:
    name: pve-exporter
    enabled: true
    state: started
