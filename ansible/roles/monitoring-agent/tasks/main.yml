---
- name: Validate API token is set
  ansible.builtin.assert:
    that:
      - pve_exporter_api_token_value | length > 0
    fail_msg: "pve_exporter_api_token_value must be set (use ansible-vault)"

- name: Create pve-exporter system group
  ansible.builtin.group:
    name: "{{ pve_exporter_group }}"
    system: true
    state: present

- name: Create pve-exporter system user
  ansible.builtin.user:
    name: "{{ pve_exporter_user }}"
    group: "{{ pve_exporter_group }}"
    system: true
    shell: /usr/sbin/nologin
    home: "{{ pve_exporter_install_dir }}"
    create_home: false

- name: Install uv
  ansible.builtin.shell:
    cmd: curl -LsSf https://astral.sh/uv/install.sh | env UV_INSTALL_DIR=/usr/local/bin sh
    creates: /usr/local/bin/uv

- name: Create install directory
  ansible.builtin.file:
    path: "{{ pve_exporter_install_dir }}"
    state: directory
    owner: "{{ pve_exporter_user }}"
    group: "{{ pve_exporter_group }}"
    mode: "0755"

- name: Install prometheus-pve-exporter via uv
  ansible.builtin.command:
    cmd: >-
      /usr/local/bin/uv pip install
      --python /usr/bin/python3
      -p {{ pve_exporter_install_dir }}/venv
      prometheus-pve-exporter=={{ pve_exporter_version }}
  become: true
  become_user: "{{ pve_exporter_user }}"
  register: uv_install
  changed_when: "'Installed' in uv_install.stdout"

- name: Deploy pve-exporter config
  ansible.builtin.template:
    src: pve-exporter.yml.j2
    dest: "{{ pve_exporter_install_dir }}/pve-exporter.yml"
    owner: "{{ pve_exporter_user }}"
    group: "{{ pve_exporter_group }}"
    mode: "0600"
  no_log: true
  notify: restart pve-exporter

- name: Deploy systemd service
  ansible.builtin.template:
    src: pve-exporter.service.j2
    dest: /etc/systemd/system/pve-exporter.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - reload systemd
    - restart pve-exporter

- name: Enable and start pve-exporter
  ansible.builtin.systemd:
    name: pve-exporter
    enabled: true
    state: started
