---
- name: Validate auth key is set
  ansible.builtin.assert:
    that:
      - tailscale_auth_key | length > 0
    fail_msg: "tailscale_auth_key must be set (use ansible-vault)"

- name: Install Tailscale apt signing key
  ansible.builtin.get_url:
    url: https://pkgs.tailscale.com/stable/debian/bookworm.noarmor.gpg
    dest: /usr/share/keyrings/tailscale-archive-keyring.gpg
    mode: "0644"

- name: Add Tailscale apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [signed-by=/usr/share/keyrings/tailscale-archive-keyring.gpg]
      https://pkgs.tailscale.com/stable/debian bookworm main
    filename: tailscale
    state: present

- name: Install tailscale
  ansible.builtin.apt:
    name: tailscale
    state: present
    update_cache: true

- name: Enable and start tailscaled
  ansible.builtin.systemd:
    name: tailscaled
    enabled: true
    state: started

- name: Check Tailscale status
  ansible.builtin.command:
    cmd: tailscale status --json
  register: tailscale_status
  changed_when: false
  failed_when: false

- name: Connect to Tailscale
  ansible.builtin.command:
    cmd: >-
      tailscale up
      --auth-key={{ tailscale_auth_key }}
      {% if tailscale_accept_routes %}--accept-routes{% endif %}
      {% for tag in tailscale_advertise_tags %}--advertise-tags={{ tag }}{% if not loop.last %} {% endif %}{% endfor %}
      {{ tailscale_extra_args }}
  no_log: true
  when: >-
    tailscale_status.rc != 0 or
    (tailscale_status.stdout | from_json).BackendState != "Running"
  changed_when: true
