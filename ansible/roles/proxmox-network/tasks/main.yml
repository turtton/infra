---
- name: Validate required network variables
  ansible.builtin.assert:
    that:
      - proxmox_network_interface | length > 0
      - proxmox_network_address | length > 0
      - proxmox_network_gateway | length > 0
    fail_msg: "proxmox_network_interface, proxmox_network_address, proxmox_network_gateway must be set in host_vars"

- name: Configure /etc/network/interfaces
  ansible.builtin.template:
    src: interfaces.j2
    dest: /etc/network/interfaces
    owner: root
    group: root
    mode: "0644"
    backup: true
  notify: reload networking
